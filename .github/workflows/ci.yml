name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./timetable-backend-mern
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './timetable-backend-mern/package-lock.json'
          
      - name: Install Backend Dependencies
        run: npm ci
        
      - name: Run Backend Tests
        run: npm test
        env:
          JWT_SECRET: superSecretKey
          # In a real scenario, use a test DB. The tests here should ideally be mocked or use memory DB.

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend1
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend1/package-lock.json'
          
      - name: Install Frontend Dependencies
        run: npm ci
        
      - name: Build Frontend
        run: npm run build
        env:
          # Dummy URL just for building the Next.js app in CI
          NEXT_PUBLIC_API_URL: http://localhost:5000/api
