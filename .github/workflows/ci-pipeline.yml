name: Automated Timetable CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: timetable-backend-mern/package-lock.json

    - name: Install Backend Dependencies
      run: |
        cd timetable-backend-mern
        npm install

    - name: Run Logic Unit Tests (Shift Left Validation)
      run: |
        cd timetable-backend-mern
        npm run test:unit

    - name: Run Integration Tests (API Validation)
      run: |
        cd timetable-backend-mern
        npm run test:integration
      env:
        MONGODB_URI: mongodb://localhost:27017/timetable_test
        PORT: 5000
